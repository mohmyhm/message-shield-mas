# Tiered decision thresholds for the policy engine
thresholds:
  theta_low: 0.35   # below: pass; [theta_low, theta): escalate
  theta: 0.65       # at or above: quarantine

# Risk propagation
risk:
  lambda: 0.6       # ancestor decay factor in R(m) = g(...) + lambda * max R(ancestor)

# Beta trust ledger initial prior
trust:
  alpha_init: 9   # optimistic prior: distrust(v)=0.1 before any observations
  beta_init: 1

# Monitor placement budget (max edges to monitor per topology)
placement:
  budget: 2

# LLM judge settings (used only in non-deterministic mode)
llm_judge:
  model: "gpt-4o-mini"
  temperature: 0.0
  max_tokens: 256

# Deterministic mode: skip all LLM calls and use rule-based scorer only
deterministic: true
