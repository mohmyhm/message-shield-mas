thresholds:
  pass: 0.25
  annotate: 0.50
  confirm: 0.75

actions:
  annotate_prefix: "[MONITOR WARNING]"
  confirm_prefix: "[MONITOR CONFIRM]"
  quarantine_message: "[BLOCKED_BY_MONITOR] Message quarantined for suspected malicious instruction tampering."

rules:
  authority_escalation:
    patterns:
      - "ignore previous instructions"
      - "ignore previous constraints"
      - "higher priority"
      - "system override"
      - "system administrator override"
      - "admin exception"
      - "admin override"

  unsafe_override:
    patterns:
      - "disable verification"
      - "bypass authentication"
      - "skip checks"
      - "skip verification"
      - "emergency bypass"
      - "master password"

  instruction_conflict:
    patterns:
      - "prioritize speed over verification"
      - "do not follow the user constraints"
      - "ignore the original task"

  role_mismatch:
    planner_forbidden:
      - "approve final answer"
      - "final answer approved"
    executor_forbidden:
      - "rewrite policy boundaries"
      - "ignore policy constraints"
    reviewer_forbidden:
      - "execute unsafe instruction"
      - "prioritize speed over safety"
